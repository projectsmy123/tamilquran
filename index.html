<!doctype html>
<html lang="ta">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#101010" />
    <title>Tamil Qur'an Recitation Aid - Surah Al-Fatihah</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="site-header">
      <div class="header-copy">
        <p class="eyebrow">Tamil Qur'an Recitation Aid</p>
        <h1>Surah Al-Fatihah</h1>
        <p class="subtitle">Arabic word boxes with Tamil direct recitation transliteration.</p>
      </div>
      <button id="themeToggle" class="icon-button" type="button" aria-label="Toggle light and dark mode">☀︎ / ☾</button>
    </header>

    <main class="container">
      <section class="notice">
        <strong>Prototype v2.</strong> Tap any word box to inspect its Arabic units, Tamil units, and tajweed notes. King Fahad Tamil translation fields remain placeholders until verified text is supplied.
      </section>

      <section class="toolbar" aria-label="Display controls">
        <button id="decreaseFont" type="button">A−</button>
        <button id="increaseFont" type="button">A+</button>
        <label><input id="showTranslation" type="checkbox" checked /> Translation</label>
        <label><input id="showNotes" type="checkbox" /> Notes</label>
        <label><input id="compactMode" type="checkbox" /> Compact</label>
      </section>

      <nav id="ayahNav" class="ayah-nav" aria-label="Ayah navigation"></nav>

      <div id="app"></div>
    </main>

    <dialog id="wordDialog" class="word-dialog">
      <form method="dialog">
        <button class="dialog-close" aria-label="Close">×</button>
      </form>
      <div id="dialogContent"></div>
    </dialog>

    <template id="ayahTemplate">
      <article class="ayah-card">
        <div class="ayah-heading">
          <div>
            <p class="ayah-label"></p>
            <h2 class="ayah-title"></h2>
          </div>
          <span class="ayah-number"></span>
        </div>

        <div class="word-grid" aria-label="Arabic words with Tamil direct transliteration"></div>

        <div class="continuous-block">
          <div class="section-title-row">
            <h3>Continuous Tamil transliteration</h3>
            <button class="copy-button copy-tamil" type="button">Copy</button>
          </div>
          <p class="continuous-tamil"></p>
        </div>

        <div class="translation-block">
          <div class="section-title-row">
            <h3>King Fahad Tamil translation</h3>
            <button class="copy-button copy-translation" type="button">Copy</button>
          </div>
          <p class="translation-text"></p>
        </div>

        <div class="notes-block">
          <h3>Tajweed / recitation notes</h3>
          <ul class="notes-list"></ul>
        </div>
      </article>
    </template>

    <script src="app.js"></script>
  </body>
</html>
